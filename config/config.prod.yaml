scene_script:
  name: scene_script_prod
  env: prod

server:
  host: 0.0.0.0
  port: 8000
  read_timeout: 60
  write_timeout: 60

mysql:
  host: mysql
  port: 3306
  user: root
  password: your-secure-password-here
  database: scene_script_db
  max_open_conns: 100
  max_idle_conns: 10
  conn_max_lifetime: 3600

redis:
  host: redis
  port: 6379
  password: ""
  db: 0
  pool_size: 10
  min_idle_conns: 5

jwt:
  secret: "your-jwt-secret-key-must-be-very-long-and-secure"
  access_expire_time: 3600      # 1 hour
  refresh_expire_time: 604800   # 7 days

log:
  level: info
  format: json
  output_path: stdout