scene_script:
  name: scene_script_prod
  env: prod

server:
  host: 0.0.0.0
  port: 8000
  read_timeout: 180
  write_timeout: 180

mysql:
  host: mysql
  port: 3306
  user: root
  password: your-secure-password-here
  database: scene_script_db
  max_open_conns: 100
  max_idle_conns: 10
  conn_max_lifetime: 3600

redis:
  host: redis
  port: 6379
  password: ""
  db: 0
  pool_size: 10
  min_idle_conns: 5

jwt:
  secret: "your-jwt-secret-key-must-be-very-long-and-secure"
  access_expire_time: 3600      # 1 hour
  refresh_expire_time: 604800   # 7 days

log:
  level: info
  format: json
  output_path: stdout

llm:
  api:
    key: "your-qwen-api-key-here"
    endpoint: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model: "qwen-plus"
    timeout_seconds: 120
    max_tokens: 4096
    top_p: 0.8
    temperature: 0.7
  prompt:
    system: "你是一位资深编剧，擅长将小说改编为结构化剧本。你必须只输出 YAML，不得输出解释、代码块围栏或额外说明。"
    repair_system: "你是一位剧本 YAML 修复专家。你只能修复 YAML 结构和缺失字段，必须保持原故事语义尽量不变，只返回修复后的 YAML 正文。"
    max_repair_attempts: 1
    template: |
      根据以下小说文本，生成结构化剧本。
      
      体裁: {genre}
      语气: {tone}
      节奏: {pacing}
      
      小说内容:
      {chapters_text}
      
      请返回严格符合 YAML Schema v1.0 的剧本，必须包含：
      - version: "1.0"
      - metadata
      - dramatis_personae
      - settings
      - chapters
      - consistency_report
      
      约束：
      - 只能返回 YAML 正文，禁止 Markdown 代码块和解释文字
      - metadata.genre、metadata.tone、metadata.pacing 必须与输入一致
      - beats.type 只能是 action、dialogue、inner、exposition
      - dialogue 和 inner 类型必须提供 dialogue.speaker 与 dialogue.content
    repair_template: |
      你之前生成的剧本 YAML 没有通过系统校验，请严格修复下列问题并重新输出完整 YAML。
      
      输入约束：
      - 源章节数必须为 {source_chapters}
      - metadata.genre 必须等于 {genre}
      - metadata.tone 必须等于 {tone}
      - metadata.pacing 必须等于 {pacing}
      - metadata.generated_at 必须使用 RFC3339，例如 {generated_at}
      - 如果原文没有作者信息，请填 "未知作者"
      - chapter.id 必须是 ch1/ch2/ch3...
      - scene.id 必须是 ch1.sc1
      - beat.id 必须是 ch1.sc1.b1
      - settings.importance 只能是 high/medium/low
      - beats.type 只能是 action/dialogue/inner/exposition
      - dialogue 和 inner 类型必须提供 dialogue.speaker 与 dialogue.content
      - 必须补齐 metadata、dramatis_personae、settings、chapters、consistency_report
      
      校验失败信息：
      {validation_errors}
      
      原始 YAML：
      {raw_yaml}
