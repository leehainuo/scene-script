services:
  mysql:
    image: mysql:8.0
    container_name: scene-script-mysql-prod
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: scene_script_db
      TZ: Asia/Shanghai
    volumes:
      - ./volumes/mysql:/var/lib/mysql
      - ../db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scene-script-prod-network

  redis:
    image: redis:6-alpine
    container_name: scene-script-redis-prod
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ./volumes/redis:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - scene-script-prod-network

  backend:
    image: scene-script-backend:prod
    build:
      context: ../..
      dockerfile: scripts/docker/Dockerfile
    container_name: scene-script-backend-prod
    restart: on-failure:3
    volumes:
      - ./config.yaml:/app/config/config.yaml:ro
      - ./volumes/logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scene-script-prod-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8000/ping || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:alpine
    container_name: scene-script-nginx-prod
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ../../frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - scene-script-prod-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/ping || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  scene-script-prod-network:
    driver: bridge
